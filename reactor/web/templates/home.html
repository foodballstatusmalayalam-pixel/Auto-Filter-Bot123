<!DOCTYPE html>

    :root { --bg:#0b0d12; --card:#141822; --accent:#7c5cff; --accent2:#19c2ff; --text:#e8ecf5; --muted:#8b93a7; }
    * { box-sizing:border-box; margin:0; padding:0; }

    a.ghost { background:transparent; border:1px solid rgba(255,255,255,.12); }
    footer { margin-top:26px; font-size:12px; color:var(--muted); }
    footer a { color:var(--accent2); text-decoration:none; }
